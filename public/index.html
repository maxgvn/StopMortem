<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StopMortem</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <span class="brand-mark">S</span>
        <h1>Stop<span class="brand-accent">Mortem</span></h1>
      </div>
      <p class="sidebar-sub">Lost-deal post-mortems</p>
    </div>
    <div id="dealList" class="deal-list"></div>
    <div id="statusStrip" class="status-strip"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <nav id="crumbs" class="crumbs"><b>Deals</b></nav>
      <div class="topbar-right">
        <span class="workspace-label">Q2 pipeline review</span>
        <div class="user-chip">
          <span class="avatar">JD</span>
          <div>
            <div class="user-name">Jane Doe</div>
            <div class="user-role">Account Executive</div>
          </div>
        </div>
      </div>
    </header>
    <div id="emptyState" class="empty-state">
      <p>Select a deal to begin.</p>
    </div>
    <div id="dealView" class="deal-view" hidden></div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
